# ═══════════════════════════════════════════
# EMERGENCY BRAKE THRESHOLDS — NEVER weaken without council vote
# ═══════════════════════════════════════════
emergency_brake:
  jr_failure_rate_threshold: 0.50
  thermal_writes_per_min_max: 100
  cpu_sustained_max: 0.95
  disk_usage_max: 0.95
  pg_connections_max: 90
  coyote_anomaly_count: 3
  coyote_window_seconds: 300
  auto_disengage_minutes: 30

# ═══════════════════════════════════════════
# DESTRUCTIVE ACTIONS — Always require pre-flight check against this manifest
# ═══════════════════════════════════════════
destructive_actions:
  database:
    - DROP TABLE
    - DROP DATABASE
    - TRUNCATE
    - "DELETE FROM (without WHERE)"
    - ALTER TABLE DROP COLUMN
  filesystem:
    - "rm -rf"
    - "rm -f on sacred paths"
    - "mv or rename of sacred files"
  services:
    - "systemctl stop (tier 0 or tier 1)"
    - "systemctl disable (any production)"
    - "systemctl mask (any production)"
  network:
    - "Changing CHEROKEE_DB_HOST"
    - "Modifying WireGuard config"
    - "Changing firewall rules"
