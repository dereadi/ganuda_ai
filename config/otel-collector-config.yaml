# Ganuda OTel Collector — Phase 3 pilot configuration
# Council approvals: 813dbb85866e45e2 + 84beb73ee61cf993
# Apr 20 2026

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  # Crawdad Council amendment (collector-side guarantee): strip known-sensitive
  # attribute keys at the collector boundary. Credential-string redaction inside
  # remaining values happens at emit-time in lib/ganuda_otel.py (O4).
  attributes/redact:
    actions:
      - key: http.request.body.content
        action: delete
      - key: http.request.header.authorization
        action: delete
      - key: http.request.header.cookie
        action: delete
      - key: password
        action: delete
      - key: token
        action: delete
      - key: api_key
        action: delete
      - key: secret
        action: delete

  # Eagle Eye Council amendment: batch + async, never block the caller
  batch:
    timeout: 5s
    send_batch_size: 512
    send_batch_max_size: 2048

  resource:
    attributes:
      - key: deployment.environment
        value: ganuda-federation
        action: upsert
      - key: service.namespace
        value: ganuda
        action: upsert

  memory_limiter:
    check_interval: 5s
    limit_mib: 1536
    spike_limit_mib: 256

exporters:
  # Phase 3 pilot: local file export. Tempo/Prometheus in a later cycle.
  file/traces:
    path: /ganuda/logs/otel-collector/traces.jsonl
    rotation:
      max_megabytes: 100
      max_days: 7
      max_backups: 5
    format: json

  file/metrics:
    path: /ganuda/logs/otel-collector/metrics.jsonl
    rotation:
      max_megabytes: 50
      max_days: 7
      max_backups: 3
    format: json

  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes/redact, resource, batch]
      exporters: [file/traces, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [file/metrics]
