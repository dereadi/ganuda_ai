# ============================================================
# CHIEF PERSONAL ASSISTANT CONFIGURATION
# Cherokee AI Federation
#
# Single source of truth for the Chief PA daemon.
# All endpoints, intervals, thresholds, and credential paths.
#
# Spec #4: Chief Personal Assistant (MVP)
# Longhouse #b940f09b18605c97 (UNANIMOUS)
#
# SECURITY: This file should be chmod 600 on bmasass.
# NEVER commit webhook URLs or credentials to source control.
# ============================================================

# --- LLM Endpoints ---
# Used by Tier 1 Reflex for briefing summary generation.
# Primary: redfin vLLM via LAN/WireGuard
# Fallback: bmasass local DeepSeek-R1 via Tailscale loopback
llm:
  primary_endpoint:
    url: "http://192.168.132.223:8000/v1/chat/completions"
    model: "/ganuda/models/qwen2.5-72b-instruct-awq"
    timeout_seconds: 30
    max_tokens: 1024
    temperature: 0.5
  fallback_endpoint:
    url: "http://100.103.27.106:8800/v1/chat/completions"
    model: "mlx-community/DeepSeek-R1-Distill-Llama-70B-4bit"
    timeout_seconds: 60
    max_tokens: 1024
    temperature: 0.5

# --- Slack Notifications ---
# Set webhook_url to your Slack Incoming Webhook URL.
# Create at: https://api.slack.com/messaging/webhooks
slack:
  webhook_url: "${SLACK_WEBHOOK_URL}"
  channel: "#chief-pa"
  bot_name: "Cherokee PA"
  bot_icon: ":eagle:"
  max_messages_per_hour: 10
  silent_start_hour: 22
  silent_end_hour: 6
  timezone: "America/Chicago"
  max_retries: 3

# --- Google Calendar ---
# OAuth2 credentials downloaded from Google Cloud Console.
# Run interactive auth ONCE to generate token, then daemon runs headless.
calendar:
  credentials_path: "~/.config/chief_pa/google_credentials.json"
  token_path: "~/.config/chief_pa/google_token.pickle"
  state_path: "~/.config/chief_pa/calendar_state.json"
  poll_interval_seconds: 300
  urgency_threshold_minutes: 30

# --- Daily Briefing ---
# Schedule in 24h format, Central Time.
briefing:
  schedule_hour: 9
  schedule_minute: 0
  timezone: "America/Chicago"
  cache_path: "~/.config/chief_pa/last_briefing.json"

# --- Database (bluefin) ---
# For cluster activity, kanban, and email classification queries.
# Password from environment variable -- never hardcode.
database:
  host: "192.168.132.222"
  port: 5432
  database: "zammad_production"
  user: "claude"
  password: "${CHEROKEE_DB_PASS}"
  connect_timeout: 10

# --- Email Triage ---
# Controls what gets surfaced from gmail_api_daemon classification.
email:
  source: "database"
  urgency_threshold: 0.8
  max_actionable_display: 5
  lookback_hours: 16

# --- Escalation ---
# Thresholds for when briefing items warrant Tier 2/3 treatment.
escalation:
  tier1_confidence_threshold: 0.7
  tier2_confidence_threshold: 0.6
  high_stakes_auto_escalate: true

# --- Health Check ---
# PA daemon self-health-check output.
health:
  check_path: "/tmp/pa_daemon_health.json"
  check_interval_seconds: 60