# --- Tier 1: REFLEX ---
# Fast, cheap, good-enough. Single LLM call. No federation deps.
# Spider requirement: self-contained.
# Latency target: <50ms p95 (excluding network to LLM).
tier1:
  enabled: true
  primary_endpoint:
    url: "http://localhost:8000/v1/chat/completions"
    model: "/ganuda/models/qwen2.5-72b-instruct-awq"
    timeout_seconds: 30
    max_tokens: 1024
    temperature: 0.5
  fallback_endpoint:
    url: "http://100.103.27.106:8800/v1/chat/completions"
    model: "mlx-community/DeepSeek-R1-Distill-Llama-70B-4bit"
    timeout_seconds: 60
    max_tokens: 1024
    temperature: 0.5
  confidence_threshold: 0.7
  latency_target_ms: 50
  max_specialists: 1
  prompt_template: |
    You are a concise, helpful assistant. Answer the user's question directly.
    If you are uncertain about the answer, say so clearly.
    Do not fabricate information.

    Question: {query}

    Context: {context}

# --- Tier 2: DELIBERATION ---
# Quick multi-perspective synthesis. 2-3 specialists. Majority vote.
# Elisi requirement: diversity scoring in every response.
# Latency target: <500ms p95.
tier2:
  enabled: true
  primary_endpoint:
    url: "http://localhost:8000/v1/chat/completions"
    model: "/ganuda/models/qwen2.5-72b-instruct-awq"
    timeout_seconds: 60
    max_tokens: 2048
    temperature: 0.7
  confidence_threshold: 0.6
  latency_target_ms: 500
  max_specialists: 3
  prompt_template: |
    You are a specialist in {domain}. Provide your perspective on this question.
    Be thorough but concise. If you disagree with other specialists, explain why.

    Question: {query}

    Context: {context}

# --- Tier 3: COUNCIL ---
# Full ethos. All 7+ specialists. Two Wolves. Sacred patterns. Thermal memory.
# Raven requirement: Tier 3 is the moat. Protect it.
# Constitutional: fixed star topology (Thermal #82856).
# Latency target: <120s p95.
tier3:
  enabled: true
  primary_endpoint:
    url: "http://localhost:8080/v1/council/query"
    model: "/ganuda/models/qwen2.5-72b-instruct-awq"
    timeout_seconds: 180
    max_tokens: 4096
    temperature: 0.7
  confidence_threshold: 0.0
  latency_target_ms: 120000
  max_specialists: 8

# --- Escalation Engine ---
# Coyote rule: humans underestimate stakes.
# Cost of over-escalation < cost of under-escalation.
# No de-escalation in v1.
escalation:
  tier1_confidence_threshold: 0.7
  tier2_confidence_threshold: 0.6
  high_stakes_keywords:
    - "VA claim"
    - "disability"
    - "legal"
    - "medical"
    - "financial"
    - "veteran"
    - "benefits"
    - "appeal"
    - "nexus letter"
    - "C&P exam"
    - "service-connected"
    - "TDIU"
    - "rating decision"
    - "sacred"
    - "constitutional"
    - "seven generation"
  max_tier3_per_hour: 5
  enable_thermal_audit: true

# --- MCP Servers ---
# Pluggable MCP tool servers for Tier 2 specialist data access.
# Servers are lazy-started on first tool call (DC-9).
# Jr Task #1285: SAG Harness DELIBERATE Phase.
mcp_servers:
  productive:
    script: "/ganuda/services/sag-v2/mcp_servers/productive_server.py"
    enabled: true
    idle_timeout_seconds: 300
  smartsheet:
    script: "/ganuda/services/sag-v2/mcp_servers/smartsheet_server.py"
    enabled: true
    idle_timeout_seconds: 300

# --- Claude Backend ---
# DC-11: External API as REACT enzyme. Governance stays local.
# SENSE and EVALUATE always run on redfin. Only REACT speciates.
# Requires ANTHROPIC_API_KEY in secrets.env.
# NOT a default tier -- used when explicitly routed or as Tier 2 fallback.
claude_endpoint:
  url: "https://api.anthropic.com/v1/messages"
  model: "claude-sonnet-4-6"
  api_key: "${ANTHROPIC_API_KEY}"
  timeout_seconds: 30
  max_tokens: 4096
  temperature: 0.7
  provider: "anthropic"